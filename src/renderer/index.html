<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MKW Ghostbusters</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>
  <header>
    <h1>MKW Ghostbusters <span id="version-stamp" style="font-size:11px; color:var(--muted); font-weight:400;"></span></h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <button id="btn-settings" class="secondary" title="Settings" style="padding:6px 12px;">⚙ Settings</button>
    </div>
  </header>

  <section id="update-banner" hidden style="margin: 0 0 12px 0; padding:10px 14px; background:#3a2c1f; border:1px solid #ffd400; border-radius:6px; color:#ffd400; font-size:13px; display:flex; justify-content:space-between; align-items:center;">
    <span id="update-banner-text"></span>
    <span><button id="update-download">Download update</button> <button id="update-dismiss" class="secondary">Dismiss</button></span>
  </section>
  <main>
    <section id="onboarding-view" hidden></section>
    <section id="settings-view" hidden></section>
    <section id="main-view">
      <section id="peer-list"></section>
      <section id="pairing-ui" hidden></section>
      <section id="track-picker"></section>
      <section id="offer-status"></section>
      <section id="slot-manager" hidden></section>
      <section id="incoming-offers"></section>
      <section id="deferred-list"></section>
      <section id="received-list"></section>
    </section>
  </main>

  <footer id="main-footer" style="display:flex; gap:8px; align-items:center; justify-content:flex-end;">
    <label style="font-size:12px; color:var(--muted);">Send to:</label>
    <select id="send-target" style="padding:6px;"><option value="__primary__">First connected friend</option></select>
    <button id="btn-send" disabled>Send selected</button>
  </footer>

  <script src="js/ghost-detail.js"></script>
  <script src="js/peer-list.js"></script>
  <script src="js/track-picker.js"></script>
  <script src="js/received-list.js"></script>
  <script src="js/pairing-ui.js"></script>
  <script src="js/slot-manager.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
