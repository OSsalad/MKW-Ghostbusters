appId: com.eschehaddon.mkw-ghostbusters
productName: MKW Ghostbusters
directories:
  output: dist
publish:
  provider: github
  owner: OSsalad
  repo: MKW-Ghostbusters
files:
  - "src/**/*"
  - "assets/tray.png"
  - "assets/tray.ico"
  - "package.json"
  - "node_modules/**/*"
win:
  target: nsis
  icon: assets/tray.ico
  # Match latest.yml (it uses dashes); avoids the GitHub-rename mismatch
  # where uploaded files with spaces become dots and break the updater.
  artifactName: "MKW-Ghostbusters-Setup-${version}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: MKW Ghostbusters
  include: build/installer.nsh
  deleteAppDataOnUninstall: false
